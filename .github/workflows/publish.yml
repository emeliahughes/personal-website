name: Publish site

on:
  push:
    branches: [ "master" ]

jobs:
  publish:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm'
    - run: npm ci
    - run: npm run build
    - name: Deploy
      uses: peaceiris/actions-gh-pages@v3
      with:
        external_repository: emeliahughes/emeliahughes.github.io
        publish_branch: main
        publish_dir: ./dist
        personal_token: ${{ secrets.PERSONAL_TOKEN }}
